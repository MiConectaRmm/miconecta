app = "miconecta-frontend"
primary_region = "gru"

[build]
  [build.args]
  NEXT_PUBLIC_API_URL = "https://api.maginf.com.br/api/v1"
  NEXT_PUBLIC_WS_URL = "wss://api.maginf.com.br"

[env]
  PORT = "3000"
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200
