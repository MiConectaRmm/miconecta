app = "miconecta-backend"
primary_region = "gru"

[build]

[env]
  PORT = "3000"
  NODE_ENV = "production"
  CORS_ORIGIN = "https://app.maginf.com.br"
  DB_SSL = "true"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  interval = "15s"
  timeout = "10s"
  grace_period = "30s"
  method = "get"
  path = "/health"
